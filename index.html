<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Video 배경 + 네온 트레일 데모</title>
<meta name="description" content="Google Stitch 스타일 비디오 배경 + 마우스 따라가는 네온 트레일 데모" />
<style>
  /* ---------------------------------------------------------------
     WHY: Google Stitch와 동일한 레이어 구조.
          배경은 사전 렌더링된 비디오(bg-loop.mp4, ffmpeg ping-pong 처리됨),
          그 위에 비네트 → 노이즈 → 네온 트레일 캔버스 → 본문 순.
          이 방식이 CSS 블롭보다 화질이 훨씬 높고 GPU 부담은 더 낮음
          (영상 디코딩은 전용 하드웨어 가속 경로를 탐).
     --------------------------------------------------------------- */

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    /* WHY: 비디오 로드 전 깜빡임 방지용 폴백 배경 (poster가 뜨기 전 한 순간) */
    background: #000;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", sans-serif;
    overflow: hidden;
    position: relative;
  }

  /*
    비디오 배경 / 폴백 이미지.
    WHY: 사용자 요청으로 1인칭 네온 터널 효과로 전환됨 (2026-05-25).
         배경 비디오/이미지는 숨김 처리. 파일은 보존 — 필요시 display:flex로 복원.
  */
  .bg-video,
  .bg-fallback {
    display: none;
  }

  /*
    네온 터널 캔버스 (1인칭 워프 효과).
    WHY: 3D 원근 투영으로 네온 사인이 멀리서 가까워지는 모션.
         z-index 1 = 가장 아래 시각 레이어. 본문/노이즈/비네트가 위에 얹힘.
         pointer-events:none이라야 클릭/스크롤 안 막음.
  */
  #tunnel-canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    pointer-events: none;
    background: #000;
  }

  /*
    상하 그라데이션 마스크 (비네트).
    WHY: 터널 효과에서도 화면 가장자리를 어둡게 해야 중앙 소실점이 강조됨.
         "터널 안으로 빨려 들어가는" 시각 깊이를 만들어줌.
  */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background:
      linear-gradient(180deg,
        rgba(0,0,0,0.5) 0%,
        rgba(0,0,0,0) 20%,
        rgba(0,0,0,0) 80%,
        rgba(0,0,0,0.8) 100%
      ),
      radial-gradient(ellipse at center,
        rgba(0,0,0,0) 35%,
        rgba(0,0,0,0.6) 100%
      );
  }

  /*
    노이즈 오버레이 — 영상 압축 banding 제거 + 필름 그레인 질감.
    WHY: H.264 압축은 그라데이션에서 띠가 보임. 노이즈 5%면 띠가 사라짐.
  */
  .noise {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.05;
    z-index: 3;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/></svg>");
  }

  /* 본문 콘텐츠 */
  .content {
    position: relative;
    z-index: 5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
    text-align: center;
  }
  .content h1 {
    font-size: clamp(2.5rem, 8vw, 6rem);
    font-weight: 400;
    letter-spacing: -0.03em;
    line-height: 1.05;
    margin-bottom: 24px;
    text-shadow: 0 4px 30px rgba(0,0,0,0.4);
  }
  .content p {
    font-size: clamp(1rem, 1.5vw, 1.5rem);
    color: rgba(255,255,255,0.85);
    max-width: 640px;
    margin-bottom: 40px;
    line-height: 1.5;
  }
  .btn {
    display: inline-block;
    padding: 16px 36px;
    background: white;
    color: black;
    text-decoration: none;
    border-radius: 999px;
    font-weight: 600;
    font-size: 1rem;
    transition: transform 0.2s, opacity 0.2s;
  }
  .btn:hover { transform: translateY(-2px); opacity: 0.88; }

  /*
    데이터 절약 모드 — 비디오 강제 숨김.
    WHY: Save-Data 헤더는 사용자가 모바일에서 명시적으로 켜는 옵션.
         이때 비디오를 자동재생하면 데이터 요금 폭탄 + 신뢰 손상.
  */
  @media (prefers-reduced-data: reduce) {
    .bg-video { display: none; }
  }
</style>
</head>
<body>

  <!-- 폴백 이미지 배경 — 비디오 위에 비디오가 깔리는 구조 (둘 다 z:0) -->
  <div class="bg-fallback" aria-hidden="true"></div>

  <!--
    배경 비디오.
    WHY: muted는 브라우저 자동재생 정책 필수 조건.
         poster는 비디오 로드 전/실패 시 표시될 정적 이미지.
         preload="metadata"는 모바일 데이터 절약 (전체 다운로드 안 함).
  -->
  <video class="bg-video"
         autoplay muted loop playsinline
         preload="metadata"
         poster="poster.jpg"
         aria-hidden="true">
    <source src="bg-loop.mp4" type="video/mp4" />
  </video>

  <!-- 네온 터널 캔버스 (1인칭 워프) -->
  <canvas id="tunnel-canvas" aria-hidden="true"></canvas>

  <!-- 비네트 -->
  <div class="vignette"></div>

  <!-- 노이즈 -->
  <div class="noise"></div>

  <!-- 본문 -->
  <main class="content">
    <h1>Design at the<br />speed of AI</h1>
    <p>비디오 배경 + 마우스 네온 트레일.<br />
       Google Stitch와 동일한 레이어 구조로 구현된 데모입니다.</p>
    <a href="#" class="btn">시작하기</a>
  </main>

  <script>
  /* ---------------------------------------------------------------
     비디오 자동재생 차단 (터널 효과로 전환됐으므로 비디오는 다운로드도 막음)
     WHY: CSS display:none만으로는 일부 브라우저가 메타데이터를 다운로드함.
          src를 비우고 pause/preload="none"으로 명시적 차단해야 데이터/배터리 절약.
     --------------------------------------------------------------- */
  (function () {
    const video = document.querySelector('.bg-video');
    if (!video) return;
    video.pause();
    video.removeAttribute('autoplay');
    video.preload = 'none';
    video.removeAttribute('src');
    // source 자식 엘리먼트도 비우기
    const src = video.querySelector('source');
    if (src) src.removeAttribute('src');
    video.load();
  })();

  /* ---------------------------------------------------------------
     1인칭 네온 터널 효과 (2026-05-25 추가)
     WHY: 3D 원근 투영으로 네온 사인이 멀리(큰 z)에서 가까이(작은 z) 이동.
          z 가 0에 가까워질수록 화면상 위치가 중앙에서 멀어지며 굵고 밝게 보임.
          → "내가 네온 사이를 뚫고 앞으로 나아가는" 1인칭 워프 효과.

          시간 곡선:
            0~10s : 천천히 (속도 1.0 → 1.5)
            10~30s: 제곱 곡선으로 가속 (1.5 → 26.5)
            30s~  : 폭주 유지 (26.5)
          밀도 곡선:
            0~10s : 180개
            10~30s: 180 → 1200개 선형 증가
            30s~  : 1200개 유지
     --------------------------------------------------------------- */
  (function () {
    const canvas = document.getElementById('tunnel-canvas');
    if (!canvas) {
      console.error('[tunnel] 캔버스 엘리먼트 못 찾음');
      return;
    }
    const ctx = canvas.getContext('2d');

    // DPR 대응. setTransform으로 변환 행렬을 깔끔히 리셋.
    // WHY: canvas.width 변경 시 변환이 리셋되는데, scale 호출을 누적하지 말고
    //      매번 setTransform으로 절대값 지정하는 게 안전.
    let dpr = window.devicePixelRatio || 1;
    let W, H, CX, CY;
    function resize() {
      dpr = window.devicePixelRatio || 1;
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      CX = W / 2;
      CY = H / 2;
    }
    resize();
    window.addEventListener('resize', resize);

    // 네온 사인 색상 팔레트 (다양한 네온 톤)
    // WHY: 단색 터널은 단조로움. 시안/마젠타/퍼플/옐로 등 네온 클래식 색을 섞어야
    //      "네온 사인 거리"의 느낌이 남.
    const HUES = [180, 195, 220, 280, 310, 330, 55, 140, 350];

    const MAX_PARTICLES = 1200;
    const INITIAL_COUNT = 180;
    const FOCAL = 320;        // 원근 초점거리 (클수록 좁은 시야각, 작을수록 넓은 시야각)
    const Z_FAR = 1800;        // 가장 먼 깊이
    const Z_SPAWN_FAR = 1000;  // 재생성 시 시작 깊이 (먼 곳에서 등장)

    // 파티클: 3D 공간의 네온 사인 한 개
    // WHY: 클래스 안 쓰고 plain object — 메모리 절약 + 일관된 shape으로 v8 최적화 유리
    function makeParticle(spawnAtFar) {
      return {
        // x/y 분포는 화면 비율보다 살짝 더 넓게 (가장자리도 채워야 자연스러움)
        x: (Math.random() - 0.5) * 2400,
        y: (Math.random() - 0.5) * 1800,
        z: spawnAtFar ? Z_SPAWN_FAR + Math.random() * 800 : Math.random() * Z_FAR + 100,
        hue: HUES[(Math.random() * HUES.length) | 0],
        prevZ: 0,
      };
    }

    const particles = [];
    for (let i = 0; i < INITIAL_COUNT; i++) particles.push(makeParticle(false));

    const startTime = performance.now();

    // 시간 → 속도 곡선
    // WHY: 0~10s는 거의 정지에 가깝게 (관찰 시간 줌), 10~30s는 제곱 곡선으로
    //      점점 더 빠르게 (체감상 "가속이 가속됨"), 30s+는 max 유지.
    function getSpeed(t) {
      if (t < 10) return 1.0 + (t / 10) * 0.5;
      if (t < 30) {
        const k = (t - 10) / 20;       // 0~1
        return 1.5 + k * k * 25;        // 1.5 → 26.5 (quadratic ease-in)
      }
      return 26.5;
    }

    // 시간 → 목표 파티클 수
    // WHY: 처음엔 띄엄띄엄, 30s엔 화면을 가득 채운 네온 폭포.
    function getTargetCount(t) {
      if (t < 10) return INITIAL_COUNT;
      if (t < 30) {
        const k = (t - 10) / 20;
        return (INITIAL_COUNT + k * (MAX_PARTICLES - INITIAL_COUNT)) | 0;
      }
      return MAX_PARTICLES;
    }

    function draw() {
      const t = (performance.now() - startTime) / 1000;
      const speed = getSpeed(t);
      const targetCount = getTargetCount(t);

      // 파티클 수 점진 증가
      while (particles.length < targetCount) particles.push(makeParticle(true));

      // 모션 블러 — 부분 페이드 (완전 clear 대신)
      // WHY: 부분 페이드를 깔면 이전 프레임의 streak이 남아서 빠른 움직임이
      //      "흐르는 빛" 처럼 보임. 알파값이 클수록 잔상 짧음(0.22 = 약 4프레임 잔상)
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = 'rgba(0, 0, 0, 0.22)';
      ctx.fillRect(0, 0, W, H);

      // additive blending — 네온이 겹치면 더 밝게 (실제 빛 합성)
      ctx.globalCompositeOperation = 'lighter';
      ctx.lineCap = 'round';

      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        p.prevZ = p.z;
        p.z -= speed;

        // z 가 0 이하 = 카메라를 지나감 → 멀리서 재생성
        if (p.z <= 1) {
          const np = makeParticle(true);
          p.x = np.x; p.y = np.y; p.z = np.z; p.hue = np.hue; p.prevZ = np.z;
          continue;
        }

        // 원근 투영: screen = (world / z) * focal + center
        // WHY: z 가 작을수록(가까울수록) 분모가 작아져 화면상 거리가 커짐 → 가장자리로 튕겨나감.
        //      z 가 클수록(멀수록) 화면상 거리가 작아져 중앙 소실점에 모임.
        const sx1 = (p.x / p.z) * FOCAL + CX;
        const sy1 = (p.y / p.z) * FOCAL + CY;
        const sx2 = (p.x / p.prevZ) * FOCAL + CX;
        const sy2 = (p.y / p.prevZ) * FOCAL + CY;

        // 화면 밖이면 스킵 (양 끝점 모두 밖일 때만)
        if ((sx1 < -50 || sx1 > W + 50 || sy1 < -50 || sy1 > H + 50) &&
            (sx2 < -50 || sx2 > W + 50 || sy2 < -50 || sy2 > H + 50)) continue;

        // 근접도 0(먼)~1(가까운). 밝기/굵기에 사용.
        const proximity = Math.min(1, (Z_FAR - p.z) / Z_FAR);
        const width = Math.max(0.5, 5 * proximity);

        // 외부 글로우 (네온 후광)
        ctx.shadowColor = `hsl(${p.hue}, 100%, 60%)`;
        ctx.shadowBlur = 18 * proximity;
        ctx.strokeStyle = `hsla(${p.hue}, 100%, 70%, ${proximity})`;
        ctx.lineWidth = width;
        ctx.beginPath();
        ctx.moveTo(sx2, sy2);
        ctx.lineTo(sx1, sy1);
        ctx.stroke();

        // 흰색 심지 (가까운 네온만) — 진짜 네온등 가운데 흰빛 재현
        if (proximity > 0.4) {
          ctx.shadowBlur = 8;
          ctx.strokeStyle = `rgba(255, 255, 255, ${proximity})`;
          ctx.lineWidth = Math.max(0.5, width / 3);
          ctx.beginPath();
          ctx.moveTo(sx2, sy2);
          ctx.lineTo(sx1, sy1);
          ctx.stroke();
        }
      }

      ctx.globalCompositeOperation = 'source-over';
      requestAnimationFrame(draw);
    }
    draw();
    console.log('[tunnel] 네온 워프 시작 — 0~10s 정찰, 10~30s 가속, 30s+ 폭주');
  })();
  </script>

</body>
</html>
