<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Video 배경 + 네온 트레일 데모</title>
<meta name="description" content="Google Stitch 스타일 비디오 배경 + 마우스 따라가는 네온 트레일 데모" />
<style>
  /* ---------------------------------------------------------------
     WHY: Google Stitch와 동일한 레이어 구조.
          배경은 사전 렌더링된 비디오(bg-loop.mp4, ffmpeg ping-pong 처리됨),
          그 위에 비네트 → 노이즈 → 네온 트레일 캔버스 → 본문 순.
          이 방식이 CSS 블롭보다 화질이 훨씬 높고 GPU 부담은 더 낮음
          (영상 디코딩은 전용 하드웨어 가속 경로를 탐).
     --------------------------------------------------------------- */

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    /* WHY: 비디오 로드 전 깜빡임 방지용 폴백 배경 (poster가 뜨기 전 한 순간) */
    background: #000;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", sans-serif;
    overflow: hidden;
    position: relative;
  }

  /*
    비디오 배경 레이어.
    WHY: object-fit:cover로 비율 깨짐 없이 화면을 꽉 채움.
         pointer-events:none이라야 비디오가 클릭/스크롤을 가로채지 않음.
         filter brightness 약간 낮춰 본문 텍스트 가독성 확보.
  */
  .bg-video {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
    pointer-events: none;
    filter: brightness(0.85) saturate(1.1);
  }

  /*
    모바일 폴백 이미지 — 비디오 안 뜰 때 보일 정적 배경.
    WHY: 모바일은 자동재생 실패율이 높고 데이터/배터리 비용도 큼.
         poster 속성과 별도로 항상 깔아두면 어떤 상황에서도 검은 화면이 안 보임.
         JS가 모바일/저전력 감지 시 비디오를 display:none으로 숨기면 이게 노출됨.
  */
  .bg-fallback {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-image: url("poster.jpg");
    background-size: cover;
    background-position: center;
    pointer-events: none;
    filter: brightness(0.85) saturate(1.1);
  }

  /*
    상하 그라데이션 마스크 (비네트).
    WHY: 스티치가 쓰는 트릭 — 영상 위/아래를 검정으로 페이드시켜
         본문 영역과 자연스럽게 섞이게 함.
  */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
      linear-gradient(180deg,
        rgba(0,0,0,0.6) 0%,
        rgba(0,0,0,0) 25%,
        rgba(0,0,0,0) 70%,
        rgba(0,0,0,0.85) 100%
      ),
      radial-gradient(ellipse at center,
        rgba(0,0,0,0) 40%,
        rgba(0,0,0,0.5) 100%
      );
  }

  /*
    노이즈 오버레이 — 영상 압축 banding 제거 + 필름 그레인 질감.
    WHY: H.264 압축은 그라데이션에서 띠가 보임. 노이즈 5%면 띠가 사라짐.
  */
  .noise {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.05;
    z-index: 2;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/></svg>");
  }

  /*
    네온 트레일 캔버스.
    WHY: 레이어 순서 — 비디오(0) → 비네트(1) → 노이즈(2) → 캔버스(3) → 본문(4).
  */
  #neon-canvas {
    position: fixed;
    inset: 0;
    z-index: 3;
    pointer-events: none;
  }

  /* 본문 콘텐츠 */
  .content {
    position: relative;
    z-index: 4;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
    text-align: center;
  }
  .content h1 {
    font-size: clamp(2.5rem, 8vw, 6rem);
    font-weight: 400;
    letter-spacing: -0.03em;
    line-height: 1.05;
    margin-bottom: 24px;
    text-shadow: 0 4px 30px rgba(0,0,0,0.4);
  }
  .content p {
    font-size: clamp(1rem, 1.5vw, 1.5rem);
    color: rgba(255,255,255,0.85);
    max-width: 640px;
    margin-bottom: 40px;
    line-height: 1.5;
  }
  .btn {
    display: inline-block;
    padding: 16px 36px;
    background: white;
    color: black;
    text-decoration: none;
    border-radius: 999px;
    font-weight: 600;
    font-size: 1rem;
    transition: transform 0.2s, opacity 0.2s;
  }
  .btn:hover { transform: translateY(-2px); opacity: 0.88; }

  /*
    데이터 절약 모드 — 비디오 강제 숨김.
    WHY: Save-Data 헤더는 사용자가 모바일에서 명시적으로 켜는 옵션.
         이때 비디오를 자동재생하면 데이터 요금 폭탄 + 신뢰 손상.
  */
  @media (prefers-reduced-data: reduce) {
    .bg-video { display: none; }
  }
</style>
</head>
<body>

  <!-- 폴백 이미지 배경 — 비디오 위에 비디오가 깔리는 구조 (둘 다 z:0) -->
  <div class="bg-fallback" aria-hidden="true"></div>

  <!--
    배경 비디오.
    WHY: muted는 브라우저 자동재생 정책 필수 조건.
         poster는 비디오 로드 전/실패 시 표시될 정적 이미지.
         preload="metadata"는 모바일 데이터 절약 (전체 다운로드 안 함).
  -->
  <video class="bg-video"
         autoplay muted loop playsinline
         preload="metadata"
         poster="poster.jpg"
         aria-hidden="true">
    <source src="bg-loop.mp4" type="video/mp4" />
  </video>

  <!-- 비네트 -->
  <div class="vignette"></div>

  <!-- 노이즈 -->
  <div class="noise"></div>

  <!-- 네온 트레일 캔버스 -->
  <canvas id="neon-canvas"></canvas>

  <!-- 본문 -->
  <main class="content">
    <h1>Design at the<br />speed of AI</h1>
    <p>비디오 배경 + 마우스 네온 트레일.<br />
       Google Stitch와 동일한 레이어 구조로 구현된 데모입니다.</p>
    <a href="#" class="btn">시작하기</a>
  </main>

  <script>
  /* ---------------------------------------------------------------
     모바일/저전력 디바이스 감지 → 비디오 자동재생 차단
     WHY: 모바일에서는 데이터/배터리 비용이 크고 자동재생 실패율도 높음.
          소형 화면 또는 Save-Data 모드 또는 저배터리면 비디오를 끄고
          poster.jpg(.bg-fallback)만 노출 → 사용자 체감 동일, 비용 0.
     --------------------------------------------------------------- */
  (function () {
    const video = document.querySelector('.bg-video');
    if (!video) return;

    const isSmallScreen = window.matchMedia('(max-width: 768px)').matches;
    const saveData = navigator.connection && navigator.connection.saveData;

    function disableVideo() {
      video.pause();
      video.removeAttribute('autoplay');
      video.preload = 'none';
      video.style.display = 'none';
    }

    if (isSmallScreen || saveData) {
      disableVideo();
      console.log('[bg] 모바일/Save-Data 감지 — poster 폴백만 사용');
    } else {
      // 데스크톱: 자동재생 보장 (Safari 등에서 가끔 실패)
      const tryPlay = () => {
        const p = video.play();
        if (p && p.catch) p.catch(() => {/* 사용자 제스처 대기 */});
      };
      tryPlay();
      const onFirst = () => {
        tryPlay();
        window.removeEventListener('click', onFirst);
        window.removeEventListener('touchstart', onFirst);
      };
      window.addEventListener('click', onFirst, { once: true });
      window.addEventListener('touchstart', onFirst, { once: true });
    }

    // 배터리 API: 충전 중 아니고 20% 이하면 비디오 정지
    // WHY: 노트북 사용자가 카페 등에서 배터리 절약 중일 때 친절한 UX.
    //      배터리 API 없는 브라우저(Safari/Firefox)는 그냥 패스.
    if (navigator.getBattery) {
      navigator.getBattery().then((battery) => {
        const checkBattery = () => {
          if (!battery.charging && battery.level < 0.2) {
            disableVideo();
            console.log('[bg] 저배터리 감지 — 비디오 일시정지');
          }
        };
        checkBattery();
        battery.addEventListener('levelchange', checkBattery);
        battery.addEventListener('chargingchange', checkBattery);
      });
    }
  })();

  /* ---------------------------------------------------------------
     네온 트레일 효과 (마우스 따라 그려지는 네온사인)
     WHY: 캔버스 위에 마우스 좌표를 점으로 누적, 인접 점들을 선으로 잇는다.
          각 점은 life 값이 매 프레임 감소 → 자연스러운 페이드 아웃.
          shadowBlur + shadowColor 조합이 "네온 튜브" 핵심.
          심지(흰 가는 선) + 후광(컬러 블러) 두 번 그려야 진짜 네온 느낌.
     --------------------------------------------------------------- */
  (function () {
    const canvas = document.getElementById('neon-canvas');
    if (!canvas) {
      console.error('[neon] 캔버스 엘리먼트를 못 찾음');
      return;
    }

    // 터치 디바이스에서는 마우스 트레일 비활성화
    // WHY: 모바일은 마우스가 없고, 터치 트레일은 손가락에 가려져 효과 없음.
    //      대신 캔버스 자체를 안 그려서 배터리/CPU 절약.
    const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
    if (isTouch) {
      canvas.style.display = 'none';
      console.log('[neon] 터치 디바이스 — 트레일 비활성화');
      return;
    }

    const ctx = canvas.getContext('2d');

    // DPR 대응 — 레티나/4K에서 1px 선이 흐려지지 않게 실해상도로 그림
    let dpr = window.devicePixelRatio || 1;
    function resize() {
      dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.scale(dpr, dpr);
    }
    resize();
    window.addEventListener('resize', resize);

    const points = [];
    const MAX_LIFE = 1.0;
    const FADE_PER_FRAME = 0.015;

    // 시작 시 화면 중앙 시드 점 (효과 살아있음 확인용)
    const cx0 = window.innerWidth / 2;
    const cy0 = window.innerHeight / 2;
    for (let i = 0; i < 60; i++) {
      const angle = (i / 60) * Math.PI * 2;
      const r = 100 + i * 2;
      points.push({
        x: cx0 + Math.cos(angle) * r,
        y: cy0 + Math.sin(angle) * r,
        life: MAX_LIFE,
        hue: (i * 6) % 360
      });
    }
    console.log('[neon] 트레일 활성화 — 마우스를 움직여보세요');

    let hueBase = 180;
    let lastX = null, lastY = null;

    window.addEventListener('mousemove', (e) => {
      if (lastX !== null) {
        const dx = e.clientX - lastX;
        const dy = e.clientY - lastY;
        const dist = Math.hypot(dx, dy);
        const steps = Math.max(1, Math.floor(dist / 4));
        for (let i = 1; i <= steps; i++) {
          points.push({
            x: lastX + (dx * i) / steps,
            y: lastY + (dy * i) / steps,
            life: MAX_LIFE,
            hue: hueBase
          });
        }
      } else {
        points.push({ x: e.clientX, y: e.clientY, life: MAX_LIFE, hue: hueBase });
      }
      lastX = e.clientX;
      lastY = e.clientY;
    });

    window.addEventListener('mouseleave', () => {
      lastX = lastY = null;
    });

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let i = points.length - 1; i >= 0; i--) {
        points[i].life -= FADE_PER_FRAME;
        if (points[i].life <= 0) points.splice(i, 1);
      }

      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      for (let i = 1; i < points.length; i++) {
        const p1 = points[i - 1];
        const p2 = points[i];

        const dist = Math.hypot(p2.x - p1.x, p2.y - p1.y);
        if (dist > 50) continue;

        const alpha = p2.life;
        const color = `hsl(${p2.hue}, 100%, 60%)`;

        // 1단계: 큰 후광 (컬러 블러)
        ctx.shadowColor = color;
        ctx.shadowBlur = 25;
        ctx.strokeStyle = `hsla(${p2.hue}, 100%, 70%, ${alpha * 0.8})`;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();

        // 2단계: 심지 (흰색 코어)
        ctx.shadowBlur = 10;
        ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
      }

      hueBase = (hueBase + 0.3) % 360;
      requestAnimationFrame(draw);
    }
    draw();
  })();
  </script>

</body>
</html>
