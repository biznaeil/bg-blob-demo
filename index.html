<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Video 배경 + 네온 트레일 데모</title>
<meta name="description" content="Google Stitch 스타일 비디오 배경 + 마우스 따라가는 네온 트레일 데모" />
<style>
  /* ---------------------------------------------------------------
     WHY: Google Stitch와 동일한 레이어 구조.
          배경은 사전 렌더링된 비디오(bg-loop.mp4, ffmpeg ping-pong 처리됨),
          그 위에 비네트 → 노이즈 → 네온 트레일 캔버스 → 본문 순.
          이 방식이 CSS 블롭보다 화질이 훨씬 높고 GPU 부담은 더 낮음
          (영상 디코딩은 전용 하드웨어 가속 경로를 탐).
     --------------------------------------------------------------- */

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    /* WHY: 비디오 로드 전 깜빡임 방지용 폴백 배경 (poster가 뜨기 전 한 순간) */
    background: #000;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", sans-serif;
    overflow: hidden;
    position: relative;
  }

  /*
    비디오 배경 레이어.
    WHY: object-fit:cover로 비율 깨짐 없이 화면을 꽉 채움.
         pointer-events:none이라야 비디오가 클릭/스크롤을 가로채지 않음.
         filter brightness 약간 낮춰 본문 텍스트 가독성 확보.
  */
  .bg-video {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
    pointer-events: none;
    filter: brightness(0.85) saturate(1.1);
  }

  /*
    모바일 폴백 이미지 — 비디오 안 뜰 때 보일 정적 배경.
    WHY: 모바일은 자동재생 실패율이 높고 데이터/배터리 비용도 큼.
         poster 속성과 별도로 항상 깔아두면 어떤 상황에서도 검은 화면이 안 보임.
         JS가 모바일/저전력 감지 시 비디오를 display:none으로 숨기면 이게 노출됨.
  */
  .bg-fallback {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-image: url("poster.jpg");
    background-size: cover;
    background-position: center;
    pointer-events: none;
    filter: brightness(0.85) saturate(1.1);
  }

  /*
    상하 그라데이션 마스크 (비네트).
    WHY: 스티치가 쓰는 트릭 — 영상 위/아래를 검정으로 페이드시켜
         본문 영역과 자연스럽게 섞이게 함.
  */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
      linear-gradient(180deg,
        rgba(0,0,0,0.6) 0%,
        rgba(0,0,0,0) 25%,
        rgba(0,0,0,0) 70%,
        rgba(0,0,0,0.85) 100%
      ),
      radial-gradient(ellipse at center,
        rgba(0,0,0,0) 40%,
        rgba(0,0,0,0.5) 100%
      );
  }

  /*
    노이즈 오버레이 — 영상 압축 banding 제거 + 필름 그레인 질감.
    WHY: H.264 압축은 그라데이션에서 띠가 보임. 노이즈 5%면 띠가 사라짐.
  */
  .noise {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.05;
    z-index: 2;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/></svg>");
  }

  /*
    네온 트레일 캔버스.
    WHY: 레이어 순서 — 비디오(0) → 비네트(1) → 노이즈(2) → 캔버스(3) → 본문(4).
  */
  #neon-canvas {
    position: fixed;
    inset: 0;
    z-index: 3;
    pointer-events: none;
  }

  /* 본문 콘텐츠 */
  .content {
    position: relative;
    z-index: 4;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
    text-align: center;
  }
  .content h1 {
    font-size: clamp(2.5rem, 8vw, 6rem);
    font-weight: 400;
    letter-spacing: -0.03em;
    line-height: 1.05;
    margin-bottom: 24px;
    text-shadow: 0 4px 30px rgba(0,0,0,0.4);
  }
  .content p {
    font-size: clamp(1rem, 1.5vw, 1.5rem);
    color: rgba(255,255,255,0.85);
    max-width: 640px;
    margin-bottom: 40px;
    line-height: 1.5;
  }
  .btn {
    display: inline-block;
    padding: 16px 36px;
    background: white;
    color: black;
    text-decoration: none;
    border-radius: 999px;
    font-weight: 600;
    font-size: 1rem;
    transition: transform 0.2s, opacity 0.2s;
  }
  .btn:hover { transform: translateY(-2px); opacity: 0.88; }

  /*
    데이터 절약 모드 — 비디오 강제 숨김.
    WHY: Save-Data 헤더는 사용자가 모바일에서 명시적으로 켜는 옵션.
         이때 비디오를 자동재생하면 데이터 요금 폭탄 + 신뢰 손상.
  */
  @media (prefers-reduced-data: reduce) {
    .bg-video { display: none; }
  }
</style>
</head>
<body>

  <!-- 폴백 이미지 배경 — 비디오 위에 비디오가 깔리는 구조 (둘 다 z:0) -->
  <div class="bg-fallback" aria-hidden="true"></div>

  <!--
    배경 비디오.
    WHY: muted는 브라우저 자동재생 정책 필수 조건.
         poster는 비디오 로드 전/실패 시 표시될 정적 이미지.
         preload="metadata"는 모바일 데이터 절약 (전체 다운로드 안 함).
  -->
  <video class="bg-video"
         autoplay muted loop playsinline
         preload="metadata"
         poster="poster.jpg"
         aria-hidden="true">
    <source src="bg-loop.mp4" type="video/mp4" />
  </video>

  <!-- 비네트 -->
  <div class="vignette"></div>

  <!-- 노이즈 -->
  <div class="noise"></div>

  <!-- 네온 트레일 캔버스 -->
  <canvas id="neon-canvas"></canvas>

  <!-- 본문 -->
  <main class="content">
    <h1>Design at the<br />speed of AI</h1>
    <p>비디오 배경 + 마우스 네온 트레일.<br />
       Google Stitch와 동일한 레이어 구조로 구현된 데모입니다.</p>
    <a href="#" class="btn">시작하기</a>
  </main>

  <script>
  /* ---------------------------------------------------------------
     모바일/저전력 디바이스 감지 → 비디오 자동재생 차단
     WHY: 모바일에서는 데이터/배터리 비용이 크고 자동재생 실패율도 높음.
          소형 화면 또는 Save-Data 모드 또는 저배터리면 비디오를 끄고
          poster.jpg(.bg-fallback)만 노출 → 사용자 체감 동일, 비용 0.
     --------------------------------------------------------------- */
  (function () {
    const video = document.querySelector('.bg-video');
    if (!video) return;

    const isSmallScreen = window.matchMedia('(max-width: 768px)').matches;
    const saveData = navigator.connection && navigator.connection.saveData;

    function disableVideo() {
      video.pause();
      video.removeAttribute('autoplay');
      video.preload = 'none';
      video.style.display = 'none';
    }

    if (isSmallScreen || saveData) {
      disableVideo();
      console.log('[bg] 모바일/Save-Data 감지 — poster 폴백만 사용');
    } else {
      // 데스크톱: 자동재생 보장 (Safari 등에서 가끔 실패)
      const tryPlay = () => {
        const p = video.play();
        if (p && p.catch) p.catch(() => {/* 사용자 제스처 대기 */});
      };
      tryPlay();
      const onFirst = () => {
        tryPlay();
        window.removeEventListener('click', onFirst);
        window.removeEventListener('touchstart', onFirst);
      };
      window.addEventListener('click', onFirst, { once: true });
      window.addEventListener('touchstart', onFirst, { once: true });
    }

    // 배터리 API: 충전 중 아니고 20% 이하면 비디오 정지
    // WHY: 노트북 사용자가 카페 등에서 배터리 절약 중일 때 친절한 UX.
    //      배터리 API 없는 브라우저(Safari/Firefox)는 그냥 패스.
    if (navigator.getBattery) {
      navigator.getBattery().then((battery) => {
        const checkBattery = () => {
          if (!battery.charging && battery.level < 0.2) {
            disableVideo();
            console.log('[bg] 저배터리 감지 — 비디오 일시정지');
          }
        };
        checkBattery();
        battery.addEventListener('levelchange', checkBattery);
        battery.addEventListener('chargingchange', checkBattery);
      });
    }
  })();

  /* ---------------------------------------------------------------
     별빛 트레일 효과 (마우스를 따라 출렁이는 수많은 별)
     WHY: 단일 네온 선이 아닌 파티클 시스템. 마우스 움직임마다 여러 별을 뿌리고
          각 별은 (1) 마우스 반대방향으로 살짝 흐름 (2) 시간에 따라 sin파로 출렁임
          (3) 별마다 다른 위상으로 깜빡임. globalCompositeOperation='lighter' 로
          별들이 겹쳐도 더 밝게 합성되어 진짜 "별빛 무리" 느낌이 남.
     --------------------------------------------------------------- */
  (function () {
    const canvas = document.getElementById('neon-canvas');
    if (!canvas) {
      console.error('[stardust] 캔버스 엘리먼트를 못 찾음');
      return;
    }

    // 터치 디바이스에서는 비활성화 (마우스 없음 + 배터리 보호)
    const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
    if (isTouch) {
      canvas.style.display = 'none';
      console.log('[stardust] 터치 디바이스 — 트레일 비활성화');
      return;
    }

    const ctx = canvas.getContext('2d');

    // DPR 대응 — 레티나에서 별이 흐려지지 않게 실해상도로 그림
    let dpr = window.devicePixelRatio || 1;
    function resize() {
      dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.scale(dpr, dpr);
    }
    resize();
    window.addEventListener('resize', resize);

    const particles = [];
    const MAX_PARTICLES = 1200;     // 메모리/성능 보호 상한
    const LIFE_DECAY = 0.010;        // 약 1.7초 후 사라짐
    let time = 0;                    // 전체 시간 (twinkle/wave 위상 계산용)

    // 차가운 색 팔레트 — 별빛/얼음 톤
    // WHY: 따뜻한 색(빨강/주황)은 불꽃 인상, 차가운 색(파랑/보라/시안)은 별 인상
    const PALETTE_HUES = [180, 200, 220, 240, 260, 280, 190, 210];

    // 마우스 상태
    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let prevX = mouseX, prevY = mouseY;
    let mouseVX = 0, mouseVY = 0;

    function spawnStar(x, y) {
      if (particles.length >= MAX_PARTICLES) return;

      // 속도: 마우스 반대방향 약간 + 수직 랜덤 스프레드
      // WHY: 반대방향 → 트레일이 뒤에 깔리는 인상.
      //      수직 스프레드 → 별들이 부채꼴로 퍼지며 출렁임.
      const backFactor = -0.15;
      const perpAngle = Math.atan2(mouseVY, mouseVX) + Math.PI / 2;
      const perpSpread = (Math.random() - 0.5) * 3;

      particles.push({
        x, y,
        vx: mouseVX * backFactor + Math.cos(perpAngle) * perpSpread,
        vy: mouseVY * backFactor + Math.sin(perpAngle) * perpSpread,
        life: 1.0,
        size: 0.5 + Math.random() * 2.0,           // 0.5~2.5px (작은 별 위주)
        hue: PALETTE_HUES[Math.floor(Math.random() * PALETTE_HUES.length)],
        twinklePhase: Math.random() * Math.PI * 2, // 깜빡임 시작 위상 (별마다 다름)
        twinkleSpeed: 3 + Math.random() * 4,       // 깜빡임 주파수 (별마다 다름)
        waveAmp: 0.5 + Math.random() * 1.8,        // 출렁임 진폭(px)
        wavePhase: Math.random() * Math.PI * 2,    // 출렁임 위상
        isWhite: false,
      });

      // 10% 확률로 큰 흰 별 (시각적 포인트)
      // WHY: 모두 비슷한 크기면 단조로움. 가끔 큰 별이 섞여야 자연스러운 별무리.
      if (Math.random() < 0.1) {
        particles.push({
          x, y,
          vx: mouseVX * backFactor * 0.5,
          vy: mouseVY * backFactor * 0.5,
          life: 1.0,
          size: 2.5 + Math.random() * 1.5,
          hue: 0,
          twinklePhase: Math.random() * Math.PI * 2,
          twinkleSpeed: 2 + Math.random() * 2,
          waveAmp: 0.3,
          wavePhase: Math.random() * Math.PI * 2,
          isWhite: true,
        });
      }
    }

    // 페이지 로드 시 화면 중앙에 시드 별 (효과 살아있음 확인용)
    // WHY: 마우스 안 움직여도 별이 보여야 트레일 활성화 여부 즉시 판단됨
    for (let i = 0; i < 30; i++) {
      const angle = Math.random() * Math.PI * 2;
      const r = Math.random() * 150;
      spawnStar(
        window.innerWidth / 2 + Math.cos(angle) * r,
        window.innerHeight / 2 + Math.sin(angle) * r
      );
    }
    console.log('[stardust] 별빛 트레일 활성화 — 마우스를 움직여보세요');

    window.addEventListener('mousemove', (e) => {
      const dx = e.clientX - prevX;
      const dy = e.clientY - prevY;
      mouseVX = dx;
      mouseVY = dy;

      // 거리에 비례한 파티클 생성 (빠른 움직임 = 더 많은 별)
      const dist = Math.hypot(dx, dy);
      const spawns = Math.min(12, Math.max(2, Math.floor(dist / 2)));
      for (let i = 0; i < spawns; i++) {
        const t = i / spawns;
        spawnStar(prevX + dx * t, prevY + dy * t);
      }

      prevX = mouseX = e.clientX;
      prevY = mouseY = e.clientY;
    });

    // 마우스 정지 80ms 후 속도 0으로 (잔여 속도로 별이 이상한 방향으로 안 쏠리게)
    let stopTimer = null;
    window.addEventListener('mousemove', () => {
      clearTimeout(stopTimer);
      stopTimer = setTimeout(() => { mouseVX = 0; mouseVY = 0; }, 80);
    });

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      time += 0.016; // ~60fps 기준 초 단위 증가

      // additive blending — 별 겹치면 더 밝게 (실제 별빛 합성처럼)
      ctx.globalCompositeOperation = 'lighter';

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];

        // 물리: 위치 적분 + 마찰
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.96;
        p.vy *= 0.96;
        p.life -= LIFE_DECAY;

        if (p.life <= 0) {
          particles.splice(i, 1);
          continue;
        }

        // 출렁임 — 각 별마다 위상 다른 sin파로 위치 진동
        // WHY: 전체적으로 "물결치는 별무리" 효과. 위상이 다 다르니
        //      모두가 같은 박자로 움직이지 않고 자연스러운 파도가 됨.
        const waveX = Math.sin(time * 2 + p.wavePhase) * p.waveAmp;
        const waveY = Math.cos(time * 2.3 + p.wavePhase) * p.waveAmp;
        const drawX = p.x + waveX;
        const drawY = p.y + waveY;

        // 깜빡임 — 별마다 다른 속도로 alpha 진동 (twinkle)
        const twinkle = 0.4 + 0.6 * Math.abs(Math.sin(time * p.twinkleSpeed + p.twinklePhase));
        const alpha = p.life * twinkle;

        // 그리기 — shadowBlur로 후광 + 원 본체
        if (p.isWhite) {
          ctx.shadowColor = 'rgba(255, 255, 255, 1)';
          ctx.shadowBlur = 16;
          ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
        } else {
          ctx.shadowColor = `hsla(${p.hue}, 100%, 80%, 1)`;
          ctx.shadowBlur = 10;
          ctx.fillStyle = `hsla(${p.hue}, 90%, 75%, ${alpha})`;
        }

        ctx.beginPath();
        ctx.arc(drawX, drawY, p.size, 0, Math.PI * 2);
        ctx.fill();
      }

      // 기본 합성 모드로 복귀 (다음 프레임의 clearRect는 source-over에서 작동)
      ctx.globalCompositeOperation = 'source-over';
      requestAnimationFrame(draw);
    }
    draw();
  })();
  </script>

</body>
</html>
