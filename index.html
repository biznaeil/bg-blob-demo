<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Video 배경 + 네온 트레일 데모</title>
<meta name="description" content="Google Stitch 스타일 비디오 배경 + 마우스 따라가는 네온 트레일 데모" />
<style>
  /* ---------------------------------------------------------------
     WHY: Google Stitch와 동일한 레이어 구조.
          배경은 사전 렌더링된 비디오(bg-loop.mp4, ffmpeg ping-pong 처리됨),
          그 위에 비네트 → 노이즈 → 네온 트레일 캔버스 → 본문 순.
          이 방식이 CSS 블롭보다 화질이 훨씬 높고 GPU 부담은 더 낮음
          (영상 디코딩은 전용 하드웨어 가속 경로를 탐).
     --------------------------------------------------------------- */

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    /* WHY: 비디오 로드 전 깜빡임 방지용 폴백 배경 (poster가 뜨기 전 한 순간) */
    background: #000;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", sans-serif;
    overflow: hidden;
    position: relative;
  }

  /*
    스크롤러 컨테이너 — 비디오 2개를 옆으로 붙여 무한 우→좌 스크롤.
    WHY: 한 개 비디오만 translateX하면 오른쪽에 빈 공간이 생김.
         같은 비디오 2개를 100vw씩 나란히 두면 한 화면 너비만큼 이동 후
         다시 0으로 wrap해도 시각적으로 연속 (두 영상이 동일하니 이음새 안 보임).
         will-change:transform으로 GPU 컴포지팅 레이어 강제 생성.
  */
  .bg-scroller {
    position: fixed;
    top: 0;
    left: 0;
    width: 200vw;
    height: 100vh;
    display: flex;
    z-index: 0;
    pointer-events: none;
    will-change: transform;
  }

  /*
    비디오 배경 레이어 (스크롤러 안에 2개).
    WHY: flex:0 0 100vw로 각 비디오가 정확히 뷰포트 너비를 차지하도록 고정.
         object-fit:cover로 비율 깨짐 없이 채움.
         filter brightness/saturate로 본문 가독성 확보 + 시네마틱 톤.
  */
  .bg-video {
    flex: 0 0 100vw;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    pointer-events: none;
    filter: brightness(0.85) saturate(1.1);
  }

  /*
    모바일 폴백 이미지 — 비디오 안 뜰 때 보일 정적 배경.
    WHY: 모바일은 자동재생 실패율이 높고 데이터/배터리 비용도 큼.
         poster 속성과 별도로 항상 깔아두면 어떤 상황에서도 검은 화면이 안 보임.
         JS가 모바일/저전력 감지 시 비디오를 display:none으로 숨기면 이게 노출됨.
  */
  .bg-fallback {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-image: url("poster.jpg");
    background-size: cover;
    background-position: center;
    pointer-events: none;
    filter: brightness(0.85) saturate(1.1);
  }

  /*
    상하 그라데이션 마스크 (비네트).
    WHY: 스티치가 쓰는 트릭 — 영상 위/아래를 검정으로 페이드시켜
         본문 영역과 자연스럽게 섞이게 함.
  */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
      linear-gradient(180deg,
        rgba(0,0,0,0.6) 0%,
        rgba(0,0,0,0) 25%,
        rgba(0,0,0,0) 70%,
        rgba(0,0,0,0.85) 100%
      ),
      radial-gradient(ellipse at center,
        rgba(0,0,0,0) 40%,
        rgba(0,0,0,0.5) 100%
      );
  }

  /*
    노이즈 오버레이 — 영상 압축 banding 제거 + 필름 그레인 질감.
    WHY: H.264 압축은 그라데이션에서 띠가 보임. 노이즈 5%면 띠가 사라짐.
  */
  .noise {
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.05;
    z-index: 2;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/></svg>");
  }

  /* 본문 콘텐츠 */
  .content {
    position: relative;
    z-index: 4;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
    text-align: center;
  }
  .content h1 {
    font-size: clamp(2.5rem, 8vw, 6rem);
    font-weight: 400;
    letter-spacing: -0.03em;
    line-height: 1.05;
    margin-bottom: 24px;
    text-shadow: 0 4px 30px rgba(0,0,0,0.4);
  }
  .content p {
    font-size: clamp(1rem, 1.5vw, 1.5rem);
    color: rgba(255,255,255,0.85);
    max-width: 640px;
    margin-bottom: 40px;
    line-height: 1.5;
  }
  .btn {
    display: inline-block;
    padding: 16px 36px;
    background: white;
    color: black;
    text-decoration: none;
    border-radius: 999px;
    font-weight: 600;
    font-size: 1rem;
    transition: transform 0.2s, opacity 0.2s;
  }
  .btn:hover { transform: translateY(-2px); opacity: 0.88; }

  /*
    데이터 절약 모드 — 비디오 강제 숨김.
    WHY: Save-Data 헤더는 사용자가 모바일에서 명시적으로 켜는 옵션.
         이때 비디오를 자동재생하면 데이터 요금 폭탄 + 신뢰 손상.
  */
  @media (prefers-reduced-data: reduce) {
    .bg-video { display: none; }
  }
</style>
</head>
<body>

  <!-- 폴백 이미지 배경 — 비디오 로드 전/실패 시 노출 -->
  <div class="bg-fallback" aria-hidden="true"></div>

  <!--
    스크롤러: 비디오 2개를 옆으로 붙여놓고 컨테이너를 좌측으로 translateX.
    WHY: 무한 우→좌 스크롤. 두 비디오는 src 동일 + autoplay/loop 동일하니
         시작 타이밍만 같으면 평생 같은 프레임을 보여줌 → 이음새 안 보임.
         muted는 자동재생 정책 필수 조건. preload="auto"는 즉시 재생 보장.
  -->
  <div class="bg-scroller" aria-hidden="true">
    <video class="bg-video"
           autoplay muted loop playsinline
           preload="auto"
           poster="poster.jpg">
      <source src="bg.mp4" type="video/mp4" />
    </video>
    <video class="bg-video"
           autoplay muted loop playsinline
           preload="auto">
      <source src="bg.mp4" type="video/mp4" />
    </video>
  </div>

  <!-- 비네트 -->
  <div class="vignette"></div>

  <!-- 노이즈 -->
  <div class="noise"></div>

  <!-- 본문 -->
  <main class="content">
    <h1>Design at the<br />speed of AI</h1>
    <p>비디오 배경 + 마우스 네온 트레일.<br />
       Google Stitch와 동일한 레이어 구조로 구현된 데모입니다.</p>
    <a href="#" class="btn">시작하기</a>
  </main>

  <script>
  /* ---------------------------------------------------------------
     비디오 자동재생 보장 + 모바일/저전력 차단 + 두 비디오 시간 동기화
     WHY: querySelectorAll로 모든 .bg-video 처리 (스크롤러 안에 2개).
          모바일/Save-Data면 스크롤러 통째로 숨기고 poster 폴백만.
          데스크톱에서는 자동재생 시도 + 첫 인터랙션 시 재시도.
          간헐적으로 두 비디오의 currentTime 차이를 보정해 이음새 드리프트 방지.
     --------------------------------------------------------------- */
  (function () {
    const scroller = document.querySelector('.bg-scroller');
    const videos = document.querySelectorAll('.bg-video');
    if (!videos.length) return;

    const isSmallScreen = window.matchMedia('(max-width: 768px)').matches;
    const saveData = navigator.connection && navigator.connection.saveData;

    function disableAll() {
      videos.forEach(v => {
        v.pause();
        v.removeAttribute('autoplay');
        v.preload = 'none';
      });
      if (scroller) scroller.style.display = 'none';
    }

    if (isSmallScreen || saveData) {
      disableAll();
      console.log('[bg] 모바일/Save-Data 감지 — 스크롤 비활성화, poster만 노출');
      return;
    }

    // 데스크톱: 자동재생 시도
    const tryPlayAll = () => {
      videos.forEach(v => {
        const p = v.play();
        if (p && p.catch) p.catch(() => {/* 사용자 제스처 대기 */});
      });
    };
    tryPlayAll();
    const onFirst = () => {
      tryPlayAll();
      window.removeEventListener('click', onFirst);
      window.removeEventListener('touchstart', onFirst);
    };
    window.addEventListener('click', onFirst, { once: true });
    window.addEventListener('touchstart', onFirst, { once: true });

    // 두 비디오 시간 동기화 (1초마다 0.1초 이상 차이 나면 보정)
    // WHY: autoplay loop인 두 비디오가 미세하게 drift할 수 있음.
    //      drift가 누적되면 wrap 순간 이음새가 살짝 보임 → 주기적 동기화.
    if (videos.length >= 2) {
      setInterval(() => {
        const t0 = videos[0].currentTime;
        const t1 = videos[1].currentTime;
        if (Math.abs(t0 - t1) > 0.1) videos[1].currentTime = t0;
      }, 1000);
    }

    // 배터리 절약 — 충전 중 아니고 20% 이하면 정지
    if (navigator.getBattery) {
      navigator.getBattery().then((battery) => {
        const check = () => {
          if (!battery.charging && battery.level < 0.2) {
            disableAll();
            console.log('[bg] 저배터리 감지 — 비디오 정지');
          }
        };
        check();
        battery.addEventListener('levelchange', check);
        battery.addEventListener('chargingchange', check);
      });
    }
  })();

  /* ---------------------------------------------------------------
     우→좌 스크롤 애니메이션 (0~30s 가속, 30s+ 최대속도 유지)
     WHY: CSS animation 대신 JS requestAnimationFrame으로 직접 계산.
          이유 ① CSS 키프레임은 30s 가속 후 wrap 시 점프가 부자연스러움
              ② JS면 dt 기반이라 탭 전환 후 복귀해도 일관된 속도
              ③ 사용자가 나중에 곡선 튜닝하기 쉬움
     속도 곡선:
       0~30s : 30 px/s → 600 px/s (제곱 가속 = 가속이 가속됨)
       30s~  : 600 px/s 유지
     wrap: position이 -100vw 이하로 가면 +100vw해서 0~-100vw 범위 유지.
           두 비디오가 동일 src/시간이라 wrap 순간 시각적 점프 없음.
     --------------------------------------------------------------- */
  (function () {
    const scroller = document.querySelector('.bg-scroller');
    if (!scroller) return;

    // 모바일/스크롤 비활성화 상태면 애니메이션 건너뜀
    if (window.getComputedStyle(scroller).display === 'none') return;

    let position = 0;
    let lastTime = performance.now();
    const startTime = lastTime;

    function tick(now) {
      // dt 최대 0.1s 캡 — 탭 전환 후 복귀 시 큰 점프 방지
      const dt = Math.min(0.1, (now - lastTime) / 1000);
      lastTime = now;
      const elapsed = (now - startTime) / 1000;

      let speed;
      if (elapsed < 30) {
        const k = elapsed / 30;             // 0 → 1
        speed = 30 + k * k * 570;            // 30 → 600 (quadratic ease-in)
      } else {
        speed = 600;
      }

      position -= speed * dt;

      // wrap: -100vw 이하로 가면 +100vw해서 항상 0 ~ -100vw 범위 유지
      const vw = window.innerWidth;
      while (position <= -vw) position += vw;

      scroller.style.transform = `translate3d(${position}px, 0, 0)`;
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
    console.log('[scroll] 우→좌 스크롤 시작 — 0~30s 가속, 30s+ 최대속도 유지');
  })();
  </script>

</body>
</html>
